async function renderProgram() {
  var el = document.getElementById('program-content');
  if (!currentEventId) {
    el.innerHTML = '<p style="color:#666;padding:24px">Select an event to view program intelligence.</p>';
    return;
  }
  el.innerHTML = '<div style="color:#666;font-size:13px;padding:8px 0">Loading program data...</div>';

  try {
    var phData = await api('GET', '/api/events/' + currentEventId + '/program-health');
    var trendData = await api('GET', '/api/analytics/trends');
    if (!phData.ok) { el.innerHTML = '<p style="color:#CC0000">Error loading program health data.</p>'; return; }

    var ph = phData;
    var evt = ph.event;
    var sum = ph.summary;

    // ── Summary cards row ──
    var summaryCards = [
      { label: 'Total Submissions', value: sum.total_submissions, sub: sum.scored + ' scored', color: '#000864' },
      { label: 'Average Score', value: sum.avg_score !== null ? sum.avg_score : '—', sub: sum.avg_score !== null ? (sum.avg_score >= 70 ? 'On track' : 'Needs attention') : 'Not yet scored', color: sum.avg_score === null ? '#6B6B6B' : sum.avg_score >= 80 ? '#007A3D' : sum.avg_score >= 60 ? '#B8860B' : '#CC0000' },
      { label: 'Approved', value: sum.approved, sub: 'of ' + sum.total_submissions + ' submissions', color: '#007A3D' },
      { label: 'Slot Utilization', value: sum.slot_utilization + '%', sub: sum.total_submissions + ' of ' + evt.slot_count + ' slots', color: sum.slot_utilization >= 80 ? '#007A3D' : sum.slot_utilization >= 50 ? '#B8860B' : '#CC0000' },
      { label: 'Disclosure Flags', value: sum.disclosure_flags, sub: sum.nda_flags + ' NDA required', color: sum.disclosure_flags > 0 ? '#CC0000' : '#007A3D' },
      { label: 'Score Improving', value: sum.improving_submissions, sub: sum.declining_submissions + ' declining', color: '#00AAE8' }
    ];

    var html = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px">';
    summaryCards.forEach(function(c) {
      html += '<div style="background:#fff;border:1px solid #EAEAEA;padding:16px">' +
        '<div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#666;margin-bottom:6px">' + c.label + '</div>' +
        '<div style="font-size:28px;font-weight:700;color:' + c.color + '">' + c.value + '</div>' +
        '<div style="font-size:11px;color:#666;margin-top:4px">' + c.sub + '</div>' +
      '</div>';
    });
    html += '</div>';

    // ── Gate readiness timeline ──
    html += '<div style="background:#fff;border:1px solid #EAEAEA;padding:16px;margin-bottom:16px">';
    html += '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">GATE READINESS</div>';
    var gateLabels = { gate_50: '50% Review', gate_75: '75% Review', gate_90: '90% Review' };
    var gateDeadlines = { gate_50: evt.gate_50_deadline, gate_75: evt.gate_75_deadline, gate_90: evt.gate_90_deadline };
    ['gate_50','gate_75','gate_90'].forEach(function(g) {
      var gr = ph.gate_readiness[g] || { pass: 0, warn: 0, block: 0, total: 1 };
      var total = gr.total || 1;
      var passPct = Math.round((gr.pass / total) * 100);
      var warnPct = Math.round((gr.warn / total) * 100);
      var blockPct = Math.round((gr.block / total) * 100);
      var deadline = gateDeadlines[g];
      var daysUntil = null;
      if (deadline) {
        var diff = new Date(deadline) - new Date();
        daysUntil = Math.ceil(diff / (1000 * 60 * 60 * 24));
      }
      html += '<div style="margin-bottom:14px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
          '<span style="font-weight:700;font-size:13px">' + gateLabels[g] + '</span>' +
          '<span style="font-size:12px;color:#666">' + (deadline ? deadline + (daysUntil !== null ? ' &mdash; ' + (daysUntil > 0 ? daysUntil + ' days remaining' : daysUntil === 0 ? 'Due today' : Math.abs(daysUntil) + ' days overdue') : '') : 'No deadline set') + '</span>' +
        '</div>' +
        '<div style="display:flex;height:20px;gap:2px">' +
          '<div style="background:#007A3D;width:' + passPct + '%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700">' + (passPct > 10 ? passPct + '%' : '') + '</div>' +
          '<div style="background:#B8860B;width:' + warnPct + '%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700">' + (warnPct > 10 ? warnPct + '%' : '') + '</div>' +
          '<div style="background:#CC0000;width:' + blockPct + '%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700">' + (blockPct > 10 ? blockPct + '%' : '') + '</div>' +
        '</div>' +
        '<div style="display:flex;gap:16px;margin-top:4px;font-size:11px;color:#666">' +
          '<span style="color:#007A3D">&#9632; Pass: ' + gr.pass + '</span>' +
          '<span style="color:#B8860B">&#9632; Warn: ' + gr.warn + '</span>' +
          '<span style="color:#CC0000">&#9632; Block: ' + gr.block + '</span>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';

    // ── Track balance ──
    html += '<div style="background:#fff;border:1px solid #EAEAEA;padding:16px;margin-bottom:16px">';
    html += '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">TRACK BALANCE</div>';
    ph.tracks.forEach(function(t) {
      var scoreColor = t.avg_score === null ? '#6B6B6B' : t.avg_score >= 80 ? '#007A3D' : t.avg_score >= 60 ? '#B8860B' : '#CC0000';
      html += '<div style="display:grid;grid-template-columns:180px 1fr 80px 80px 80px;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #EAEAEA;font-size:13px">' +
        '<div style="font-weight:700">' + t.track + '</div>' +
        '<div style="background:#EAEAEA;height:8px"><div style="background:#00AAE8;width:' + Math.min(t.slot_fill_pct, 100) + '%;height:100%"></div></div>' +
        '<div style="text-align:center;font-size:12px;color:#666">' + t.submissions + ' sub' + (t.submissions !== 1 ? 's' : '') + '</div>' +
        '<div style="text-align:center"><span style="background:' + scoreColor + ';color:#fff;padding:2px 8px;font-size:11px;font-weight:700">' + (t.avg_score !== null ? t.avg_score : '—') + '</span></div>' +
        '<div style="text-align:center;font-size:11px;color:#666">' + t.has_demo_pct + '% demo</div>' +
      '</div>';
    });
    html += '</div>';

    // ── Score distribution histogram ──
    html += '<div style="background:#fff;border:1px solid #EAEAEA;padding:16px;margin-bottom:16px">';
    html += '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">SCORE DISTRIBUTION</div>';
    var dist = ph.score_distribution;
    var maxBucket = Math.max.apply(null, Object.values(dist).concat([1]));
    html += '<div style="display:flex;align-items:flex-end;gap:8px;height:80px;margin-bottom:8px">';
    Object.keys(dist).forEach(function(bucket) {
      var count = dist[bucket];
      var heightPct = Math.round((count / maxBucket) * 100);
      var color = bucket.startsWith('8') || bucket.startsWith('9') ? '#007A3D' : bucket.startsWith('7') || bucket.startsWith('6') ? '#B8860B' : '#CC0000';
      html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">' +
        '<div style="font-size:11px;font-weight:700;color:' + color + '">' + (count > 0 ? count : '') + '</div>' +
        '<div style="width:100%;background:' + (count > 0 ? color : '#EAEAEA') + ';height:' + Math.max(heightPct, count > 0 ? 8 : 4) + '%;min-height:4px"></div>' +
        '<div style="font-size:10px;color:#666">' + bucket + '</div>' +
      '</div>';
    });
    html += '</div>';
    html += '<div style="font-size:12px;color:#666">Overall average: <strong>' + (sum.avg_score !== null ? sum.avg_score + '/100' : 'Not yet scored') + '</strong> &mdash; ' + sum.scored + ' of ' + sum.total_submissions + ' submissions scored</div>';
    html += '</div>';

    // ── Speaker diversity ──
    var div = ph.speaker_diversity;
    var total = div.intel_only + div.with_partner;
    if (total > 0) {
      var partnerPct = Math.round((div.with_partner / total) * 100);
      html += '<div style="background:#fff;border:1px solid #EAEAEA;padding:16px;margin-bottom:16px">';
      html += '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">SPEAKER DIVERSITY</div>';
      html += '<div style="display:flex;height:24px;margin-bottom:8px">' +
        '<div style="background:#000864;width:' + (100 - partnerPct) + '%;display:flex;align-items:center;padding:0 8px;font-size:11px;color:#fff;font-weight:700">Intel Only: ' + div.intel_only + '</div>' +
        '<div style="background:#00AAE8;width:' + partnerPct + '%;display:flex;align-items:center;padding:0 8px;font-size:11px;color:#fff;font-weight:700">' + (partnerPct > 15 ? 'With Partner: ' + div.with_partner : '') + '</div>' +
      '</div>';
      html += '<div style="font-size:12px;color:#666">' + partnerPct + '% of sessions include partner or customer participation</div>';
      html += '</div>';
    }

    // ── Cross-event trends ──
    if (trendData.ok) {
      html += '<div style="background:#fff;border:1px solid #EAEAEA;padding:16px;margin-bottom:16px">';
      html += '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">CROSS-EVENT TRENDS</div>';

      // Insight chips
      if (trendData.insights && trendData.insights.length > 0) {
        trendData.insights.forEach(function(ins) {
          var bg = ins.type === 'positive' ? '#F0FAF5' : ins.type === 'negative' ? '#FFF0F0' : '#F5F5F5';
          var border = ins.type === 'positive' ? '#007A3D' : ins.type === 'negative' ? '#CC0000' : '#EAEAEA';
          var icon = ins.type === 'positive' ? '&#9650;' : ins.type === 'negative' ? '&#9660;' : '&#9632;';
          html += '<div style="padding:8px 12px;background:' + bg + ';border-left:3px solid ' + border + ';margin-bottom:8px;font-size:13px">' +
            '<span style="color:' + border + ';font-weight:700;margin-right:6px">' + icon + ' ' + ins.metric + '</span>' +
            ins.text + '</div>';
        });
      }

      // Event score trajectory table
      if (trendData.events && trendData.events.length > 1) {
        html += '<div style="margin-top:12px;font-size:12px">';
        html += '<div style="display:grid;grid-template-columns:1fr 80px 80px 80px;gap:8px;font-weight:700;color:#666;padding-bottom:6px;border-bottom:1px solid #EAEAEA;margin-bottom:8px">' +
          '<div>Event</div><div style="text-align:center">Submissions</div><div style="text-align:center">Avg Score</div><div style="text-align:center">Demo %</div></div>';
        trendData.events.forEach(function(e) {
          var isCurrentEvent = String(e.id) === String(currentEventId);
          html += '<div style="display:grid;grid-template-columns:1fr 80px 80px 80px;gap:8px;padding:6px 0;border-bottom:1px solid #EAEAEA;' + (isCurrentEvent ? 'background:#EEF6FB;margin:0 -12px;padding:6px 12px;' : '') + '">' +
            '<div style="font-weight:' + (isCurrentEvent ? '700' : '400') + '">' + e.name + (isCurrentEvent ? ' <span style="font-size:10px;background:#00AAE8;color:#fff;padding:1px 6px">CURRENT</span>' : '') + '</div>' +
            '<div style="text-align:center">' + e.total_submissions + '</div>' +
            '<div style="text-align:center;font-weight:700;color:' + (e.avg_score === null ? '#6B6B6B' : e.avg_score >= 70 ? '#007A3D' : '#CC0000') + '">' + (e.avg_score !== null ? e.avg_score : '—') + '</div>' +
            '<div style="text-align:center">' + e.demo_pct + '%</div>' +
          '</div>';
        });
        html += '</div>';
      }
      html += '</div>';

      // Memory insight cards
      if (trendData.memory_cards && trendData.memory_cards.length > 0) {
        html += '<div style="background:#fff;border:1px solid #EAEAEA;padding:16px;margin-bottom:16px">';
        html += '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">MEMORY BRAIN INSIGHTS</div>';
        var catColors = { what_worked:'#007A3D', what_didnt:'#CC0000', topic_trend:'#00AAE8', audience_signal:'#B8860B' };
        trendData.memory_cards.forEach(function(m) {
          var catColor = catColors[m.category] || '#6B6B6B';
          html += '<div style="padding:10px 12px;background:#f9f9f9;border-left:3px solid ' + catColor + ';margin-bottom:6px;font-size:12px">' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +
              '<span style="font-weight:700;color:' + catColor + '">' + (m.category||'').replace(/_/g,' ').toUpperCase() + '</span>' +
              '<span style="color:#666;font-size:11px">' + (m.event_name || '') + '</span>' +
            '</div>' +
            escHtml(m.content) +
          '</div>';
        });
        html += '</div>';
      }
    }

    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = '<p style="color:#CC0000">Error: ' + err.message + '</p>';
  }
}


// ─── MEMORY BRAIN UI ─────────────────────────────────────────────────────────

var memoryTab = 'browse';

async function renderMemory() {
  var el = document.getElementById('memory-content');
  if (!currentEventId) { el.innerHTML = '<p style="color:#666;padding:24px">Select an event to view memory.</p>'; return; }
  var tabs = [['browse','Memory Browser'],['survey','Survey Import'],['speakers','Speaker History']];
  var nav = '<div style="display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid #EAEAEA">';
  tabs.forEach(function(t) { nav += '<button id="mtab-' + t[0] + '" class="mem-tab' + (memoryTab===t[0]?' active':'') + '">' + t[1] + '</button>'; });
  nav += '</div><div id="memory-tab-content"></div>';
  el.innerHTML = nav;
  tabs.forEach(function(t) { var b=document.getElementById('mtab-'+t[0]); if(b) b.onclick=function(){switchMemoryTab(t[0]);}; });
  renderMemoryTab();
}

function switchMemoryTab(tab) {
  memoryTab = tab;
  document.querySelectorAll('.mem-tab').forEach(function(t){t.classList.remove('active');});
  var btn = document.getElementById('mtab-'+tab);
  if (btn) btn.classList.add('active');
  renderMemoryTab();
}

async function renderMemoryTab() {
  var el = document.getElementById('memory-tab-content');
  if (!el) return;

  if (memoryTab === 'browse') {
    el.innerHTML = '<div style="color:#666;font-size:13px">Loading memories...</div>';
    var data = await api('GET', '/api/events/' + currentEventId + '/memories');
    if (!data.ok) { el.innerHTML = '<p style="color:#CC0000">Error loading memories.</p>'; return; }
    var memories = data.memories || [];
    var parts = [];
    parts.push('<div style="padding:16px;background:#fff;border:1px solid #EAEAEA;margin-bottom:16px">');
    parts.push('<div style="font-weight:700;font-size:12px;text-transform:uppercase;margin-bottom:10px">ADD MEMORY</div>');
    parts.push('<div style="display:flex;gap:8px;margin-bottom:8px">');
    parts.push('<select id="mem-cat" style="flex:0 0 160px">');
    parts.push('<option value="what_worked">What Worked</option>');
    parts.push('<option value="what_didnt">What Didn&#39;t</option>');
    parts.push('<option value="speaker_insight">Speaker Insight</option>');
    parts.push('<option value="topic_trend">Topic Trend</option>');
    parts.push('<option value="audience_signal">Audience Signal</option>');
    parts.push('<option value="kpi_outcome">KPI Outcome</option>');
    parts.push('</select><input id="mem-content" placeholder="Enter memory..." style="flex:1">');
    parts.push('<button id="btn-add-mem" class="btn-primary">Add</button></div></div>');
    if (memories.length === 0) {
      parts.push('<p style="color:#666;padding:16px 0">No memories yet. Import survey data or add manually.</p>');
      el.innerHTML = parts.join('');
      var ab0 = el.querySelector('#btn-add-mem'); if (ab0) ab0.onclick = addMemory;
      return;
    }
    var catColors = { what_worked:'#007A3D', what_didnt:'#CC0000', speaker_insight:'#000864', topic_trend:'#00AAE8', audience_signal:'#B8860B', kpi_outcome:'#2E2F2F', manual:'#6B6B6B', auto_extracted:'#000864' };
    parts.push('<div style="margin-bottom:8px;font-size:12px;color:#666">' + memories.length + ' memories</div>');
    memories.forEach(function(m) {
      var cc = catColors[m.category] || '#6B6B6B';
      var sp = Math.round((m.signal_strength / 3.0) * 100);
      parts.push('<div style="padding:12px;background:#fff;border:1px solid #EAEAEA;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px">');
      parts.push('<span style="background:' + cc + ';color:#fff;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap">' + (m.category||'').replace(/_/g,' ').toUpperCase() + '</span>');
      parts.push('<div style="flex:1;font-size:13px">' + escHtml(m.content) + '</div>');
      parts.push('<div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px">');
      parts.push('<div style="font-size:10px;color:#666">Signal</div>');
      parts.push('<div style="background:#EAEAEA;width:60px;height:6px"><div style="background:#00AAE8;width:' + sp + '%;height:100%"></div></div>');
      parts.push('<div style="display:flex;gap:4px">');
      parts.push('<button data-mid="' + m.id + '" data-dir="up" class="msb" style="background:none;border:1px solid #EAEAEA;padding:2px 6px;cursor:pointer;font-size:11px">&#9650;</button>');
      parts.push('<button data-mid="' + m.id + '" data-dir="down" class="msb" style="background:none;border:1px solid #EAEAEA;padding:2px 6px;cursor:pointer;font-size:11px">&#9660;</button>');
      parts.push('<button data-mid="' + m.id + '" data-action="del" class="mdb" style="background:none;border:1px solid #EAEAEA;padding:2px 6px;cursor:pointer;font-size:11px;color:#CC0000">&#10005;</button>');
      parts.push('</div></div></div>');
    });
    el.innerHTML = parts.join('');
    var ab1 = el.querySelector('#btn-add-mem'); if (ab1) ab1.onclick = addMemory;
    el.querySelectorAll('.msb').forEach(function(b) { b.onclick = function() { signalMemory(parseInt(this.dataset.mid), this.dataset.dir); }; });
    el.querySelectorAll('.mdb').forEach(function(b) { b.onclick = function() { deleteMemory(parseInt(this.dataset.mid)); }; });

  } else if (memoryTab === 'survey') {
    var sp2 = [];
    sp2.push('<div style="padding:16px;background:#fff;border:1px solid #EAEAEA">');
    sp2.push('<div style="font-weight:700;font-size:12px;text-transform:uppercase;margin-bottom:12px">IMPORT POST-EVENT SURVEY</div>');
    sp2.push('<p style="font-size:13px;color:#666;margin-bottom:16px">Upload a CSV export. Column headers are auto-detected and mapped to Intel KPI fields.</p>');
    sp2.push('<label style="font-weight:700;font-size:12px">Survey CSV File</label>');
    sp2.push('<input type="file" id="survey-file" accept=".csv" style="display:block;margin-top:6px;margin-bottom:12px">');
    sp2.push('<button id="btn-imp-sv" class="btn-primary">Import Survey Data</button>');
    sp2.push('<div id="survey-import-result" style="margin-top:12px"></div>');
    sp2.push('<div style="margin-top:20px;padding-top:16px;border-top:1px solid #EAEAEA">');
    sp2.push('<div style="font-weight:700;font-size:12px;text-transform:uppercase;margin-bottom:8px">EXTRACT LESSONS FROM SURVEY</div>');
    sp2.push('<p style="font-size:13px;color:#666;margin-bottom:12px">Run AI lesson extraction to generate memory entries from survey results.</p>');
    sp2.push('<button id="btn-ext-ls" class="btn-secondary">Extract Lessons with AI</button>');
    sp2.push('<div id="lesson-extract-result" style="margin-top:8px"></div>');
    sp2.push('</div><div id="survey-stats-container" style="margin-top:20px"></div></div>');
    el.innerHTML = sp2.join('');
    var ib = el.querySelector('#btn-imp-sv'); if (ib) ib.onclick = importSurvey;
    var eb = el.querySelector('#btn-ext-ls'); if (eb) eb.onclick = extractLessons;
    loadSurveyStats();

  } else if (memoryTab === 'speakers') {
    var sd = await api('GET', '/api/speakers?event_id=' + currentEventId);
    var spkrs = (sd.speakers || []).filter(function(s) { return s.full_name; });
    if (!spkrs.length) { el.innerHTML = '<p style="color:#666;padding:16px 0">No speaker history yet.</p>'; return; }
    var sh = '<div style="font-size:12px;color:#666;margin-bottom:12px">Performance sourced from post-event surveys.</div>';
    spkrs.forEach(function(sp) {
      sh += '<div style="padding:12px;background:#fff;border:1px solid #EAEAEA;margin-bottom:6px;display:flex;gap:16px">' +
        '<div style="font-weight:700;flex:1">' + escHtml(sp.full_name) + '</div>' +
        '<div style="font-size:12px;color:#666">' + escHtml(sp.title||'') + '</div></div>';
    });
    el.innerHTML = sh;
  }
}

async function addMemory() {
  var cat = document.getElementById('mem-cat'); if(!cat) return;
  var inp = document.getElementById('mem-content'); if(!inp) return;
  var val = inp.value.trim(); if (!val) return;
  var r = await api('POST', '/api/events/' + currentEventId + '/memories', { category: cat.value, content: val });
  if (r.ok) { inp.value = ''; renderMemoryTab(); }
  else alert(r.error || 'Failed to add memory');
}

async function signalMemory(id, direction) {
  await api('PUT', '/api/memories/' + id + '/signal', { direction: direction });
  renderMemoryTab();
}

async function deleteMemory(id) {
  if (!confirm('Delete this memory?')) return;
  await api('DELETE', '/api/memories/' + id);
  renderMemoryTab();
}

async function importSurvey() {
  var file = document.getElementById('survey-file');
  if (!file || !file.files[0]) { alert('Please select a CSV file'); return; }
  var el = document.getElementById('survey-import-result');
  el.innerHTML = '<div style="color:#666;font-size:13px">Importing...</div>';
  var form = new FormData();
  form.append('survey', file.files[0]);
  try {
    var r = await fetch('/api/events/' + currentEventId + '/memories/import-survey', { method: 'POST', body: form });
    var d = await r.json();
    if (d.ok) {
      el.innerHTML = '<div style="color:#007A3D;font-weight:700">&#10003; Imported ' + d.imported + ' responses (' + d.skipped + ' skipped).</div>';
      loadSurveyStats();
    } else {
      el.innerHTML = '<div style="color:#CC0000">' + (d.error||'Import failed') + '</div>';
    }
  } catch(e) { el.innerHTML = '<div style="color:#CC0000">Error: ' + e.message + '</div>'; }
}

async function extractLessons() {
  var el = document.getElementById('lesson-extract-result');
  el.innerHTML = '<div style="color:#666;font-size:13px">Extracting lessons...</div>';
  var r = await api('POST', '/api/events/' + currentEventId + '/memories/extract-lessons');
  if (r.ok) {
    el.innerHTML = '<div style="color:#007A3D;font-weight:700">&#10003; Extracted ' + r.lessons_extracted + ' lessons.</div>';
    if (memoryTab === 'survey') setTimeout(function(){switchMemoryTab('browse');}, 1500);
  } else {
    el.innerHTML = '<div style="color:#CC0000">' + (r.error||'Extraction failed') + '</div>';
  }
}

async function loadSurveyStats() {
  var el = document.getElementById('survey-stats-container');
  if (!el) return;
  var data = await api('GET', '/api/events/' + currentEventId + '/survey');
  if (!data.ok || !data.summary || data.summary.total_responses === '0') {
    el.innerHTML = '<div style="color:#666;font-size:12px">No survey data imported yet.</div>';
    return;
  }
  var s = data.summary;
  var kpis = [
    {key:'avg_satisfaction',label:'Avg Session Satisfaction',target:4.0,max:5},
    {key:'avg_relevance',label:'Avg Business Relevance',target:3.75,max:5},
    {key:'avg_speaker_quality',label:'Avg Speaker Quality',target:4.0,max:5},
    {key:'avg_nps',label:'Avg NPS',target:7.5,max:10},
    {key:'pct_high_value',label:'% High Event Value',target:80,max:100},
    {key:'pct_partner_lift',label:'% Partner Select Lift',target:75,max:100}
  ];
  var html = '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px">SURVEY RESULTS &mdash; ' + s.total_responses + ' RESPONSES</div>';
  kpis.forEach(function(kpi){
    var val = parseFloat(s[kpi.key])||0;
    var pct = Math.round((val/kpi.max)*100);
    var tpct = Math.round((kpi.target/kpi.max)*100);
    var color = val >= kpi.target ? '#007A3D' : '#CC0000';
    html += '<div style="margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">' +
        '<span>'+kpi.label+'</span><span style="font-weight:700;color:'+color+'">'+val+' <span style="color:#666;font-weight:400">/ target '+kpi.target+'</span></span>' +
      '</div>' +
      '<div style="background:#EAEAEA;height:8px;position:relative">' +
        '<div style="background:'+color+';width:'+pct+'%;height:100%"></div>' +
        '<div style="position:absolute;top:0;left:'+tpct+'%;width:2px;height:100%;background:#2E2F2F"></div>' +
      '</div></div>';
  });
  el.innerHTML = '<div style="padding:12px;background:#fff;border:1px solid #EAEAEA">' + html + '</div>';
}

function updateAbstractCounter() {
  var textarea = document.getElementById('sf-abstract');
  var counter = document.getElementById('abstract-counter');
  if (textarea && counter) {
    counter.textContent = textarea.value.length;
  }
}

function toggleAbstractOverride() {
  var checkbox = document.getElementById('abstract-override');
  var textarea = document.getElementById('sf-abstract');
  var limitSpan = document.getElementById('abstract-limit');
  if (!checkbox || !textarea || !limitSpan) return;
  if (checkbox.checked) {
    textarea.maxLength = 1000;
    limitSpan.textContent = '1000';
  } else {
    textarea.maxLength = 650;
    limitSpan.textContent = '650';
    if (textarea.value.length > 650) {
      textarea.value = textarea.value.slice(0, 650);
      updateAbstractCounter();
    }
  }
}
