.alert{padding:12px 16px;margin-bottom:16px;font-size:13px;}

<body>
<div id="sidebar">
  <div class="logo"><img src="/api/assets/Logo.png" alt="Intel"></div>

<script defer>
var currentEventId = localStorage.getItem('selectedEventId') || null;
var allEvents = [];
var allSubmissions = [];

function toTitleCase(str) {
  if (!str) return '';
  return str.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.getElementById('section-' + name).classList.add('active');
  document.querySelectorAll('#sidebar nav a').forEach(function(a,i){
    a.classList.toggle('active', ['events','submissions','review','speakers','memory'][i] === name);
  });
  document.getElementById('page-title').textContent = name.charAt(0).toUpperCase() + name.slice(1);
  document.getElementById('topbar-action').innerHTML = '';
  if (name === 'events') { renderEventsList(); addTopbarBtn('New Event', showNewEventForm); }
  if (name === 'submissions') { renderSubmissions(); }
  if (name === 'review') { renderReview(); }
  if (name === 'speakers') { renderSpeakers(); addTopbarBtn('Add Speaker', () => showSpeakerForm()); }
  if (name === 'memory') { renderMemory(); }
}

function addTopbarBtn(label, fn) {
  var btn = document.createElement('button');
  btn.className = 'btn-primary'; btn.textContent = label; btn.onclick = function() { fn(); };
  document.getElementById('topbar-action').appendChild(btn);
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  console.log('[api] Request:', method, path);
  var opts = { method: method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  try {
    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 30000);
    opts.signal = controller.signal;
    var r = await fetch(path, opts);
    clearTimeout(timeoutId);
    console.log('[api] Response status:', r.status);
    if (!r.ok) {
      var errText = await r.text();
      console.error('[api] Error response:', errText);
      try { return JSON.parse(errText); } catch(e) { return { ok: false, error: 'HTTP ' + r.status + ': ' + errText }; }
    }
    var data = await r.json();
    console.log('[api] Response data:', data);
    return data;
  } catch (err) {
    console.error('[api] Fetch error:', err);
    if (err.name === 'AbortError') return { ok: false, error: 'Request timed out after 30 seconds' };
    return { ok: false, error: err.message };
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
async function loadEvents() {
  var data = await api('GET', '/api/events');
  allEvents = data.events || data || [];
  var sel = document.getElementById('event-select');
  sel.innerHTML = allEvents.map(function(e){
    return '<option value="' + e.id + '"' + (String(e.id) === String(currentEventId) ? ' selected' : '') + '>' + e.name + '</option>';
  }).join('');
  if (!currentEventId && allEvents.length) { currentEventId = String(allEvents[0].id); sel.value = currentEventId; }
  return allEvents;
}

function onEventChange() {
  currentEventId = document.getElementById('event-select').value;
  localStorage.setItem('selectedEventId', currentEventId);
  var sect = document.querySelector('.section.active');
  if (sect && sect.id === 'section-submissions') renderSubmissions();
  if (sect && sect.id === 'section-review') renderReview();
  if (sect && sect.id === 'section-speakers') renderSpeakers();
  if (sect && sect.id === 'section-memory') renderMemory();
}

async function renderEventsList() {
  var el = document.getElementById('events-list');
  el.innerHTML = '<div class="loading">Loading...</div>';
  await loadEvents();
  var subsByEvent = {};
  for (var ei = 0; ei < allEvents.length; ei++) {
    var evId = allEvents[ei].id;
    var subs = await api('GET', '/api/submissions?event_id=' + evId);
    subsByEvent[evId] = (subs.submissions || []).length;
  }
  el.innerHTML = allEvents.map(function(e){
    var count = subsByEvent[e.id] || 0;
    var slots = e.slot_count || 12;
    var pct = Math.min(100, Math.round(count/slots*100));
    return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h3>' + e.name + '</h3><div class="meta">' + (e.event_date||'') + ' &nbsp;|&nbsp; ' + (e.venue||'') + '</div></div><div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px"><span class="badge" style="background:#000864">' + count + ' / ' + slots + ' slots</span><button class="btn-secondary" style="font-size:12px;padding:4px 10px" onclick="showNewEventForm(allEvents.find(function(ev){return ev.id===' + e.id + ';}))">Edit</button></div></div><div class="slot-bar" style="margin-top:12px"><div class="slot-bar-fill" style="width:' + pct + '%"></div></div></div>';
  }).join('') || '<div class="loading">No events yet.</div>';
}

// ── Profile field helpers ─────────────────────────────────────────────────────
function getProfileFieldsHtml() {
  return '<div class="form-group"><label>Event Strategy</label><textarea id="ef-profile-strategy" rows="4" placeholder="What is the overarching strategy for this event?"></textarea></div>' +
    '<div class="form-group"><label>Goals</label><textarea id="ef-profile-goals" rows="3" placeholder="What are the primary goals and objectives?"></textarea></div>' +
    '<div class="form-group"><label>KPIs</label><textarea id="ef-profile-kpis" rows="3" placeholder="How will success be measured?"></textarea></div>' +
    '<div class="form-group"><label>Audience</label><textarea id="ef-profile-audience" rows="3" placeholder="Who is the target audience? Roles, seniority, departments..."></textarea></div>' +
    '<div class="form-group"><label>Content Pillars</label><textarea id="ef-profile-pillars" rows="3" placeholder="Key themes and topic areas for content submissions..."></textarea></div>' +
    '<div class="form-group"><label>Additional Information</label><textarea id="ef-profile-additional" rows="4" placeholder="Any other context: portfolio highlights, speaker requirements, format constraints..."></textarea></div>';
}

function populateProfileFields(rawProfile) {
  if (!rawProfile) return;
  var profileObject = null;
  if (typeof rawProfile === 'object' && rawProfile !== null) {
    profileObject = rawProfile;
  } else if (typeof rawProfile === 'string') {
    try {
      var parsed = JSON.parse(rawProfile);
      if (typeof parsed === 'object' && parsed !== null) {
        profileObject = parsed;
      }
    } catch (e) { /* Not JSON — treat as legacy string */ }
  }
  if (profileObject) {
    document.getElementById('ef-profile-strategy').value = profileObject.event_strategy || '';
    document.getElementById('ef-profile-goals').value = profileObject.goals || '';
    document.getElementById('ef-profile-kpis').value = profileObject.kpis || '';
    document.getElementById('ef-profile-audience').value = profileObject.audience || '';
    document.getElementById('ef-profile-pillars').value = profileObject.content_pillars || '';
    document.getElementById('ef-profile-additional').value = profileObject.additional_information || '';
  } else if (typeof rawProfile === 'string') {
    // Legacy plain-text profile — drop into Additional Information
    document.getElementById('ef-profile-additional').value = rawProfile;
  }
}

function buildContextRawFromFields() {
  var parts = [
    { label: 'Event Strategy', id: 'ef-profile-strategy' },
    { label: 'Goals', id: 'ef-profile-goals' },
    { label: 'KPIs', id: 'ef-profile-kpis' },
    { label: 'Audience', id: 'ef-profile-audience' },
    { label: 'Content Pillars', id: 'ef-profile-pillars' },
    { label: 'Additional Information', id: 'ef-profile-additional' }
  ];
  var lines = [];
  parts.forEach(function(p) {
    var val = (document.getElementById(p.id) || {}).value || '';
    val = val.trim();
    if (val) lines.push(p.label + ':\n' + val);
  });
  return lines.join('\n\n');
}

function buildProfileJsonFromFields() {
  return JSON.stringify({
    event_strategy: (document.getElementById('ef-profile-strategy') || {}).value || '',
    goals: (document.getElementById('ef-profile-goals') || {}).value || '',
    kpis: (document.getElementById('ef-profile-kpis') || {}).value || '',
    audience: (document.getElementById('ef-profile-audience') || {}).value || '',
    content_pillars: (document.getElementById('ef-profile-pillars') || {}).value || '',
    additional_information: (document.getElementById('ef-profile-additional') || {}).value || ''
  });
}

// ── Event form ────────────────────────────────────────────────────────────────
function showNewEventForm(editEvent) {

  window._editGeneratedProfile = null;

  if (isEdit) {
    panel.innerHTML = '<h2>Edit Event: ' + (editEvent.name || '') + '</h2>' +

        '<div class="tab active" id="panel-tab-details">Details</div>' +
        '<div class="tab" id="panel-tab-profile">Content Profile</div>' +
      '</div>' +
      '<div id="panel-pane-details">' +
        '<div class="form-group"><label>Event Name *</label><input id="ef-name" value="' + (editEvent.name || '') + '"></div>' +
        '<div class="grid-2">' +
          '<div class="form-group"><label>Event Date</label><input id="ef-date" value="' + (editEvent.event_date || '') + '"></div>' +
          '<div class="form-group"><label>Total Session Slots</label><input id="ef-slots" type="number" value="' + ((editEvent.slot_count || editEvent.total_slots) || 12) + '"></div>' +
        '</div>' +
        '<div class="form-group"><label>Venue</label><input id="ef-venue" value="' + (editEvent.venue || '') + '"></div>' +
        '<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
          '<div class="form-group" style="margin:0"><label style="font-size:12px">Event Slug (for portal URL)</label><input id="ef-slug" value="' + (editEvent.slug||'') + '" placeholder="intel-federal-summit-2026"></div>' +
          '<div class="form-group" style="margin:0"><label style="font-size:12px">Reviewer Notification Email</label><input id="ef-notify-email" value="' + (editEvent.notification_email||'') + '" placeholder="reviewer@intel.com"></div>' +
        '</div>' +
        '<div style="margin-top:16px;padding:12px;background:#f5f5f5;border:1px solid #EAEAEA">' +
          '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#2E2F2F;margin-bottom:10px">GATE DEADLINES</div>' +
          '<div class="grid-2" style="gap:8px">' +
            '<div class="form-group" style="margin:0"><label style="font-size:12px">50% Review Deadline</label><input id="ef-gate50" type="date" value="' + (editEvent.gate_50_deadline || '') + '"></div>' +
            '<div class="form-group" style="margin:0"><label style="font-size:12px">75% Review Deadline</label><input id="ef-gate75" type="date" value="' + (editEvent.gate_75_deadline || '') + '"></div>' +
          '</div>' +
          '<div class="form-group" style="margin-top:8px;margin-bottom:0"><label style="font-size:12px">90% Review Deadline</label><input id="ef-gate90" type="date" value="' + (editEvent.gate_90_deadline || '') + '"></div>' +
        '</div>' +
        '<button class="btn-primary" id="btn-save-details" style="margin-top:12px">Save Details</button>' +
      '</div>' +
      '<div id="panel-pane-profile" style="display:none;">' +
        getProfileFieldsHtml() +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">' +
          '<button class="btn-secondary" id="btn-regen-profile">Regenerate with AI</button>' +
          '<button class="btn-primary" id="btn-save-profile">Save Profile</button>' +
        '</div>' +
        '<div id="edit-profile-result" style="margin-top:16px"></div>' +
      '</div>';

    populateProfileFields(editEvent.context_profile);

    document.getElementById('panel-tab-details').addEventListener('click', function() { switchPanelTab('details'); });
    document.getElementById('panel-tab-profile').addEventListener('click', function() { switchPanelTab('profile'); });
    document.getElementById('btn-save-details').addEventListener('click', function() { saveEventEdit(editEvent.id); });
    document.getElementById('btn-regen-profile').addEventListener('click', regenerateProfileEdit);
    document.getElementById('btn-save-profile').addEventListener('click', function() { saveEventProfile(editEvent.id); });

  } else {
    panel.innerHTML = '<h2>New Event</h2>' +
      '<div id="event-form-step1">' +
        '<div class="form-group"><label>Event Name *</label><input id="ef-name" value=""></div>' +
        '<div class="grid-2">' +
          '<div class="form-group"><label>Event Date</label><input id="ef-date" value=""></div>' +
          '<div class="form-group"><label>Total Session Slots</label><input id="ef-slots" type="number" value="12"></div>' +

var subFilters = { search: '', track: '', bu: '', status: '', has_demo: '', has_partner: '' };

function parseAiScore(s) {
  if (!s.ai_score) return s;
  if (typeof s.ai_score === 'string') {
    try { s.ai_score = JSON.parse(s.ai_score); } catch(e) { s.ai_score = null; }
  }
  return s;
}

async function renderSubmissions() {
  console.log('[renderSubmissions] START, currentEventId:', currentEventId);
  var el = document.getElementById('submissions-content');
  if (!currentEventId) { 
    el.innerHTML = '<div class="loading">Select an event first.</div>'; 
    return; 
  }
  try {
    el.innerHTML = '<div class="loading">Loading...</div>';
    var event = allEvents.find(function(e){return String(e.id)===String(currentEventId);});
    console.log('[renderSubmissions] Calling API...');
    var data = await api('GET', '/api/submissions?event_id=' + currentEventId);
    console.log('[renderSubmissions] API returned:', JSON.stringify(data).slice(0, 500));
    if (!data) {
      throw new Error('API returned null/undefined');
    }
    if (data.ok === false) {
      throw new Error(data.error || 'API returned ok:false');
    }
    if (!data.submissions) {
      throw new Error('No submissions array in response. Keys: ' + Object.keys(data).join(', '));
    }
    allSubmissions = (data.submissions || []).map(parseAiScore);
    var tracks = [...new Set(allSubmissions.map(function(s){return s.track;}).filter(Boolean))];
    var bus = [...new Set(allSubmissions.map(function(s){return s.bu;}).filter(Boolean))];
    var slots = event ? event.slot_count || 12 : 12;
    var used = allSubmissions.length;
    var pct = Math.min(100, Math.round(used/slots*100));
    el.innerHTML = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="flex:1"><div class="slot-bar"><div class="slot-bar-fill" style="width:' + pct + '%"></div></div><div style="font-size:12px;color:#888;margin-top:4px">' + used + ' / ' + slots + ' slots used</div></div><button class="btn-primary" onclick="showAddSubmission()">+ Add Submission</button><button class="btn-secondary" onclick="exportCSV()">Export CSV</button></div>' +
      '<div class="filter-bar"><input placeholder="Search title / speaker..." oninput="subFilters.search=this.value;renderSubTable()" value="' + subFilters.search + '"><select onchange="subFilters.track=this.value;renderSubTable()"><option value="">All Tracks</option>' + tracks.map(function(t){return '<option value="' + t + '"' + (subFilters.track===t?' selected':'') + '>' + t + '</option>';}).join('') + '</select><select onchange="subFilters.bu=this.value;renderSubTable()"><option value="">All BUs</option>' + bus.map(function(b){return '<option value="' + b + '"' + (subFilters.bu===b?' selected':'') + '>' + b + '</option>';}).join('') + '</select><select onchange="subFilters.status=this.value;renderSubTable()"><option value="">All Status</option><option value="submitted">Submitted</option><option value="under_review">Under Review</option><option value="approved">Approved</option><option value="rejected">Rejected</option><option value="needs_revision">Needs Revision</option></select></div>' +
      '<div id="sub-table"></div>';
    renderSubTable();
  } catch (err) {
    el.innerHTML = '<div class="alert alert-error">Failed to load submissions: ' + err.message + '</div>';
  }
}

function renderSubTable() {
  var filtered = allSubmissions.filter(function(s){
    if (subFilters.search) { var q = subFilters.search.toLowerCase(); if (!(s.title||'').toLowerCase().includes(q) && !(s.speaker_names||'').toLowerCase().includes(q) && !(s.content_lead||'').toLowerCase().includes(q)) return false; }
    if (subFilters.track && s.track !== subFilters.track) return false;
    if (subFilters.bu && s.bu !== subFilters.bu) return false;
    if (subFilters.status && s.status !== subFilters.status) return false;
    return true;
  });
  var html = '<table><thead><tr><th>Title</th><th>BU</th><th>Track</th><th>Format</th><th>Speakers</th><th>Demo</th><th>Status</th><th>AI Score</th><th>Actions</th></tr></thead><tbody>';
  filtered.forEach(function(s){
    var score = s.ai_score ? (s.ai_score.overall_score != null ? s.ai_score.overall_score : s.ai_score.overall) : null;
    var scoreBadge = score !== null ? '<span class="badge ' + (score>=80?'score-high':score>=60?'score-mid':'score-low') + '">Score: ' + score + '</span>' : '<span class="badge score-none">Not Scored</span>';
    var statusBadge = '<span class="badge badge-' + (s.status||'submitted') + '">' + toTitleCase(s.status||'submitted') + '</span>';
    html += '<tr><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + (s.title||'') + '">' + (s.title||'').slice(0,55) + (s.title&&s.title.length>55?'...':'') + (s.disclosure_flag?'<span title="Disclosure Review Required" style="color:#CC0000;font-weight:700;margin-left:4px">⚠</span>':'') + (s.nda_required?'<span title="NDA Required" style="color:#B8860B;margin-left:4px">🔒</span>':'') + '</td><td>' + (s.bu||'&mdash;') + '</td><td>' + (s.track||'&mdash;') + '</td><td>' + (s.format||'&mdash;') + '</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + (s.speaker_names||'') + '">' + (s.speaker_names||'&mdash;') + '</td><td style="text-align:center">' + (s.demos&&s.demos!=='None'&&s.demos!=='TBD'?'&#10003;':'&mdash;') + '</td><td>' + statusBadge + '</td><td>' + scoreBadge + '</td><td class="actions"><a onclick="viewSubmission(' + s.id + ')">View</a><a onclick="scoreSubmission(' + s.id + ')">Score</a><a onclick="editStatus(' + s.id + ')">Status</a><a onclick="editSubmission(' + s.id + ')">Edit</a></td></tr>';
  });
  html += '</tbody></table>';
  if (!filtered.length) html = '<div class="loading">No submissions match filters.</div>';
  document.getElementById('sub-table').innerHTML = html;
}

async function populateSpeakerDropdown(selectedSpeakerIds) {
  const select = document.getElementById('sf-speaker_id');
  if (!select) return;
  select.innerHTML = ''; // Reset for multi-select
  
  // Normalize selectedSpeakerIds to array
  var selectedIds = selectedSpeakerIds || [];
  if (!Array.isArray(selectedIds)) selectedIds = selectedIds ? [selectedIds] : [];
  selectedIds = selectedIds.map(function(id) { return String(id); });
  
  try {
    const data = await api('GET', `/api/speakers?event_id=${currentEventId}`);
    const speakers = data.speakers || [];
    speakers.forEach(speaker => {
      const option = document.createElement('option');
      option.value = speaker.id;
      option.textContent = `${speaker.full_name} (${speaker.company || 'N/A'})`;
      if (selectedIds.indexOf(String(speaker.id)) !== -1) {
        option.selected = true;
      }
      select.appendChild(option);
    });
  } catch (error) {
    console.error('Failed to populate speaker dropdown:', error);
    select.innerHTML = '<option value="">Error loading speakers</option>';
  }
}

function submissionForm(s) {
  var f = s || {};
  var fields = [
    ['title','Title'],
    ['content_lead','Content Lead'],
    ['bu','BU'],
    ['track','Track'],
    ['format','Format'],
    ['duration','Duration'],
    ['speaker_id', 'Speaker', 'select'],
    ['abstract','Abstract','textarea'],
    ['key_topics','Key Topics','textarea'],
    ['demos','Demos'],
    ['featured_products','Featured Products'],
    ['business_challenge','Business Challenge'],
    ['partner_highlights','Partner Highlights'],
    ['new_launches','New Launches']
  ];
  return fields.map(function(fd){
    var id = fd[0], label = fd[1], type = fd[2];
    var val = f[id] || '';
    if (type === 'textarea') {
      if (id === 'abstract') {
        return `<div class="form-group"><label>${label}</label><textarea id="sf-${id}" rows="3" maxlength="650" oninput="updateAbstractCounter()">${val}</textarea><div style="font-size:11px;color:#888;margin-top:4px"><span id="abstract-counter">${val.length}</span> / <span id="abstract-limit">650</span> characters</div><div style="display:flex;align-items:center;gap:4px;margin-top:8px;justify-content:flex-start"><input type="checkbox" id="abstract-override" onchange="toggleAbstractOverride()" style="margin:0;cursor:pointer;width:auto"><span style="font-size:12px;font-weight:400;cursor:pointer" onclick="document.getElementById('abstract-override').click()">Override (allow 1000 characters)</span></div></div>`;
      }
      return `<div class="form-group"><label>${label}</label><textarea id="sf-${id}" rows="3">${val}</textarea></div>`;
    }
    if (type === 'select') {
      return `<div class="form-group"><label for="sf-${id}">${label}</label><select id="sf-${id}" multiple style="height:120px"></select><div style="font-size:11px;color:#888;margin-top:4px">Hold Ctrl/Cmd to select multiple speakers</div></div>`;
    }
    return `<div class="form-group"><label>${label}</label><input id="sf-${id}" value="${val.toString().replace(/"/g,'&quot;')}"></div>`;
  }).join('');
}

function getSubmissionFormData() {
  var fields = ['title','content_lead','bu','track','format','duration','abstract','key_topics','demos','featured_products','business_challenge','partner_highlights','new_launches'];
  var data = { event_id: currentEventId };
  fields.forEach(function(f){ data[f] = (document.getElementById('sf-' + f)||{}).value || ''; });
  
  // Collect multiple selected speakers from multi-select
  var speakerSelect = document.getElementById('sf-speaker_id');
  var speakerIds = [];
  if (speakerSelect) {
    for (var i = 0; i < speakerSelect.options.length; i++) {
      if (speakerSelect.options[i].selected) {
        speakerIds.push(parseInt(speakerSelect.options[i].value, 10));
      }
    }
  }
  data.speaker_ids = speakerIds;
  return data;
}

async function scoreSubmission(id) {
  var panel = document.getElementById('slide-panel');
  panel.innerHTML = '<h2>Scoring...</h2><div class="loading">Running AI alignment scoring...</div>';

  if (r.error) { panel.innerHTML = '<h2>Error</h2><div class="alert alert-error">' + r.error + '</div>'; return; }
  var raw = r.scorecard || r.ai_score || r;
  var normalized = {
    overall_score: raw.overall_score || raw.overall || 0,
    dimension_scores: raw.dimension_scores || raw.dimensions || {},
    strengths: raw.strengths || [],
    gaps: raw.gaps || [],
    recommendation: raw.recommendation || '',
    recommendation_rationale: raw.recommendation_rationale || raw.rationale || ''
  };
  var idx2 = allSubmissions.findIndex(function(x){return x.id===id;});
  if (idx2>=0) allSubmissions[idx2].ai_score = normalized;
  renderSubTable();
  viewSubmission(id);
}

function copyEnrichedAbstract() {
  var textElement = document.getElementById('enriched-text');
  if (!textElement) {
    alert('Could not find enriched text to copy.');
    return;
  }
  
  var html = textElement.innerHTML;
  var text = textElement.innerText;

  navigator.clipboard.write([
    new ClipboardItem({
      'text/html': new Blob([html], { type: 'text/html' }),
      'text/plain': new Blob([text], { type: 'text/plain' })
    })
  ]).then(function() {
    alert('Enriched abstract copied to clipboard!');
  }, function(err) {
    alert('Failed to copy text: ' + err);
  });
}

// ── Review ────────────────────────────────────────────────────────────────────
var compareIds = [];

async function renderReview() {
  var el = document.getElementById('review-content');
  if (!currentEventId) { 
    el.innerHTML = '<div class="loading">Select an event first.</div>'; 
    return; 
  }
  try {
    el.innerHTML = '<div class="loading">Loading...</div>';
    var data = await api('GET', '/api/submissions?event_id=' + currentEventId);
    if (!data.ok || !data.submissions) throw new Error(data.error || 'API request failed or returned invalid data');
    allSubmissions = (data.submissions || []).map(parseAiScore);
    var scored = allSubmissions.filter(function(s){return s.ai_score;});
    var unscored = allSubmissions.filter(function(s){return !s.ai_score;});
    var tracks = {};
    allSubmissions.forEach(function(s){ if (s.track) { if (!tracks[s.track]) tracks[s.track] = []; tracks[s.track].push(s); } });
    var sortedSubs = scored.slice().sort(function(a,b){return (b.ai_score.overall_score||0)-(a.ai_score.overall_score||0);});

    var html = '';
    html += '<div class="grid-3" style="margin-bottom:20px">';
    html += '<div class="stat-card"><div class="num">' + allSubmissions.length + '</div><div class="lbl">Total Submissions</div></div>';
    html += '<div class="stat-card"><div class="num">' + scored.length + '</div><div class="lbl">Scored</div></div>';
    html += '<div class="stat-card"><div class="num">' + unscored.length + '</div><div class="lbl">Unscored</div></div>';
    html += '</div>';
    html += '<div style="margin-bottom:20px">';
    html += '<button class="btn-primary" onclick="scoreAllUnscored()">Score All Unscored (' + unscored.length + ')</button> ';
    html += '<button class="btn-secondary" onclick="exportCSV()">Export CSV</button>';
    html += '</div>';
    html += '<div class="tabs">';
    html += '<div class="tab active" id="tab-ranked" onclick="reviewTab(this, &quot;ranked&quot;)">Ranked</div>';
    html += '<div class="tab" id="tab-tracks" onclick="reviewTab(this, &quot;tracks&quot;)">By Track</div>';
    html += '<div class="tab" id="tab-compare" onclick="reviewTab(this, &quot;compare&quot;)">Compare</div>';
    html += '</div>';

    html += '<div id="review-ranked">';
    html += '<h3 style="font-weight:700;margin-bottom:12px">All Submissions by Score</h3>';
    if (sortedSubs.length === 0) {
      html += '<div class="loading">No scored submissions yet. Run scoring first.</div>';
    } else {
      sortedSubs.forEach(function(s) {
        var sc = s.ai_score;
        var scoreNum = (sc && sc.overall_score !== null && sc.overall_score !== undefined) ? sc.overall_score : null;
        var cls = scoreNum !== null ? (scoreNum >= 80 ? 'score-high' : scoreNum >= 60 ? 'score-mid' : 'score-low') : 'score-none';
        var scoreText = scoreNum !== null ? 'Score: ' + scoreNum : 'Not Scored';
        html += '<div class="card" style="display:flex;justify-content:space-between;align-items:flex-start">';
        html += '<div style="flex:1"><div style="font-weight:700">' + (s.title||'') + '</div>';
        html += '<div style="font-size:12px;color:#888">' + (s.bu||'') + ' | ' + (s.track||'') + '</div>';
        html += '<div style="font-size:12px;margin-top:4px;color:#444">' + (sc ? (sc.recommendation||'') : '') + '</div></div>';
        html += '<div style="text-align:right;margin-left:16px">';
        html += '<span class="badge ' + cls + '" style="font-size:18px;padding:6px 12px">' + scoreText + '</span>';
        html += '<div style="margin-top:8px"><a style="color:#00AAE8;cursor:pointer;font-size:12px" onclick="viewSubmission(' + s.id + ')">View Details</a></div>';
        html += '</div></div>';
      });
    }
    html += '</div>';

    html += '<div id="review-tracks" style="display:none">';
    Object.keys(tracks).forEach(function(track) {
      var ts = tracks[track].slice().sort(function(a,b){return ((b.ai_score&&b.ai_score.overall_score)||0)-((a.ai_score&&a.ai_score.overall_score)||0);});
      html += '<div style="margin-bottom:20px">';
      html += '<h3 style="font-weight:700;margin-bottom:8px;padding-bottom:8px;border-bottom:2px solid #00AAE8">' + track + ' (' + ts.length + ')</h3>';
      ts.forEach(function(s) {
        var sc = s.ai_score;
        var scoreNum = (sc && sc.overall_score !== null && sc.overall_score !== undefined) ? sc.overall_score : null;
        var cls = scoreNum !== null ? (scoreNum >= 80 ? 'score-high' : scoreNum >= 60 ? 'score-mid' : 'score-low') : 'score-none';
        var scoreVal = scoreNum !== null ? 'Score: ' + scoreNum : 'Not Scored';
        html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #EAEAEA">';
        html += '<div><div style="font-weight:500">' + (s.title||'').slice(0,70) + '</div>';
        html += '<div style="font-size:11px;color:#888">' + (s.bu||'') + '</div></div>';
        html += '<div style="display:flex;align-items:center;gap:8px">';
        html += '<span class="badge ' + cls + '">' + scoreVal + '</span>';
        html += '<a style="color:#00AAE8;cursor:pointer;font-size:12px" onclick="viewSubmission(' + s.id + ')">View</a>';
        html += '</div></div>';
      });
      html += '</div>';
    });
    html += '</div>';

    html += '<div id="review-compare" style="display:none">';
    html += '<div style="margin-bottom:12px;font-size:13px;color:#666">Select 2-3 submissions to compare:</div>';
    html += '<div id="compare-picks" style="margin-bottom:16px">';
    allSubmissions.forEach(function(s) {
      html += '<label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer">';
      html += '<input type="checkbox" value="' + s.id + '" onchange="toggleCompare(' + s.id + ')"> ';
      html += (s.title||'').slice(0,80) + '</label>';
    });
    html += '</div><div id="compare-table"></div></div>';

    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = '<div class="alert alert-error">Failed to load review data: ' + err.message + '</div>';
  }
}

async function scoreAllUnscored() {
  var unscored = allSubmissions.filter(function(s){return !s.ai_score;});
  if (!unscored.length) { alert('All submissions already scored.'); return; }
  if (!confirm('Score ' + unscored.length + ' unscored submissions? This may take a minute.')) return;
  var btn = event.target; btn.disabled = true; btn.textContent = 'Scoring...';
  for (var i = 0; i < unscored.length; i++) {
    btn.textContent = 'Scoring ' + (i+1) + ' / ' + unscored.length + '...';
    var r = await api('POST', '/api/submissions/' + unscored[i].id + '/score');
    if (r.ai_score || r.overall_score) { var idx = allSubmissions.findIndex(function(s){return s.id===unscored[i].id;}); if (idx>=0) allSubmissions[idx].ai_score = r.ai_score || r; }
  }
  btn.disabled = false; btn.textContent = 'Score All Unscored';
  renderReview();
}

// ── Review tab switcher ──────────────────────────────────────────────────────
function reviewTab(el, name) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  ['ranked','tracks','compare'].forEach(function(n){
    var div = document.getElementById('review-' + n);
    if (div) div.style.display = n === name ? 'block' : 'none';
  });
}

function toggleCompare(id) {
  var idx = compareIds.indexOf(id);
  if (idx === -1) { if (compareIds.length < 3) compareIds.push(id); }
  else { compareIds.splice(idx, 1); }
  renderCompareTable();
}

function renderCompareTable() {
  var el = document.getElementById('compare-table');
  if (!el) return;
  var subs = compareIds.map(function(id){ return allSubmissions.find(function(s){return s.id===id;}); }).filter(Boolean);
  if (subs.length < 2) { el.innerHTML = '<div class="loading">Select 2 or 3 submissions above to compare.</div>'; return; }
  var dims = ['federal_relevance','technical_depth','intel_alignment','audience_fit','innovation_signal','delivery_readiness'];
  var html = '<table><thead><tr><th>Dimension</th>' + subs.map(function(s){return '<th>' + (s.title||'').slice(0,30) + '</th>';}).join('') + '</tr></thead><tbody>';
  dims.forEach(function(d){
    html += '<tr><td style="font-weight:500">' + toTitleCase(d) + '</td>';
    subs.forEach(function(s){
      var sc = s.ai_score && s.ai_score.dimension_scores && s.ai_score.dimension_scores[d] ? s.ai_score.dimension_scores[d].score : (s.ai_score && s.ai_score.dimensions && s.ai_score.dimensions[d] ? s.ai_score.dimensions[d].score : '&mdash;');
      var dimCls = typeof sc === 'number' ? (sc>=80?'score-high':sc>=60?'score-mid':'score-low') : 'score-none';
      var dimLabel = typeof sc === 'number' ? 'Score: ' + sc : 'Not Scored';
      html += '<td><span class="badge ' + dimCls + '">' + dimLabel + '</span></td>';
    });
    html += '</tr>';
  });
  html += '<tr><td style="font-weight:700">Overall</td>';
  subs.forEach(function(s){
    var ov = s.ai_score ? (s.ai_score.overall_score || s.ai_score.overall || null) : null;
    var ovCls = typeof ov === 'number' ? (ov>=80?'score-high':ov>=60?'score-mid':'score-low') : 'score-none';
    var ovLabel = typeof ov === 'number' ? 'Score: ' + ov : 'Not Scored';
    html += '<td><span class="badge ' + ovCls + '" style="font-size:14px">' + ovLabel + '</span></td>';
  });
  html += '</tr></tbody></table>';
  el.innerHTML = html;
}

async function handleSpeakerSubmit(event, speakerId) {
    event.preventDefault();
    const form = document.getElementById('speaker-form');
    const formData = new FormData(form);

    if (!speakerId) {
         formData.append('event_id', currentEventId);
    }

    const method = speakerId ? 'PUT' : 'POST';
    const url = speakerId ? `/api/speakers/${speakerId}` : '/api/speakers';

    const submitButton = form.querySelector('button[type="submit"]');
    const originalButtonText = submitButton.textContent;
    submitButton.disabled = true;
    submitButton.textContent = 'Saving...';

    try {
        const response = await fetch(url, {
            method: method,
            body: formData
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
        }

        await response.json();
        closePanel();
        renderSpeakers();
    } catch (error) {
        alert('Error saving speaker: ' + error.message);
        console.error('Error:', error);
    } finally {
        submitButton.disabled = false;
        submitButton.textContent = originalButtonText;
    }
}

async function deleteSpeaker(id) {
    if (confirm('Are you sure you want to delete this speaker? This cannot be undone.')) {
        try {
            const response = await fetch(`/api/speakers/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
            }
            renderSpeakers();
        } catch (error) {
            alert('Error deleting speaker: ' + error.message);
            console.error('Error:', error);
        }
    }
}

async function addMemory() {

  var content = document.getElementById('mem-content').value.trim();

async function importSurvey() {
  var file = document.getElementById('survey-file').files[0];
  if (!file) { alert('Please select a CSV file'); return; }
  var el = document.getElementById('survey-import-result');
  el.innerHTML = '<div style="color:#666;font-size:13px">Importing...</div>';
  var form = new FormData();
  form.append('survey', file);
  try {
    var r = await fetch('/api/events/' + currentEventId + '/memories/import-survey', { method: 'POST', body: form });
    var data = await r.json();
    if (data.ok) {
      el.innerHTML = '<div style="color:#007A3D;font-weight:700">✓ Imported ' + data.imported + ' responses (' + data.skipped + ' skipped). ' + data.total_rows + ' total rows processed.</div>';
      loadSurveyStats();
    } else {
      el.innerHTML = '<div style="color:#CC0000">' + (data.error || 'Import failed') + '</div>';
    }
  } catch(e) {
    el.innerHTML = '<div style="color:#CC0000">Error: ' + e.message + '</div>';
  }
}

async function loadSurveyStats() {
  var el = document.getElementById('survey-stats-container');
  if (!el) return;
  var data = await api('GET', '/api/events/' + currentEventId + '/survey');
  if (!data.ok || !data.summary || data.summary.total_responses === '0') {
    el.innerHTML = '<div style="color:#666;font-size:12px">No survey data imported yet.</div>';
    return;
  }
  var s = data.summary;
  var kpiTargets = { avg_satisfaction: { label: 'Avg Session Satisfaction', target: 4.0, max: 5 }, avg_relevance: { label: 'Avg Business Relevance', target: 3.75, max: 5 }, avg_speaker_quality: { label: 'Avg Speaker Quality', target: 4.0, max: 5 }, avg_nps: { label: 'Avg NPS', target: 7.5, max: 10 }, pct_high_value: { label: '% High Event Value', target: 80, max: 100 }, pct_partner_lift: { label: '% Partner Select Lift', target: 75, max: 100 } };
  var html = '<div style="font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px">SURVEY RESULTS — ' + s.total_responses + ' RESPONSES</div>';
  Object.keys(kpiTargets).forEach(function(k) {
    var kpi = kpiTargets[k];
    var val = parseFloat(s[k]) || 0;
    var pct = Math.round((val / kpi.max) * 100);
    var targetPct = Math.round((kpi.target / kpi.max) * 100);
    var color = val >= kpi.target ? '#007A3D' : '#CC0000';
    html += '<div style="margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">' +
        '<span>' + kpi.label + '</span>' +
        '<span style="font-weight:700;color:' + color + '">' + val + ' <span style="color:#666;font-weight:400">/ target ' + kpi.target + '</span></span>' +
      '</div>' +
      '<div style="background:#EAEAEA;height:8px;position:relative">' +
        '<div style="background:' + color + ';width:' + pct + '%;height:100%"></div>' +
        '<div style="position:absolute;top:0;left:' + targetPct + '%;width:2px;height:100%;background:#2E2F2F"></div>' +
      '</div>' +
    '</div>';
  });
  el.innerHTML = '<div style="padding:12px;background:#fff;border:1px solid #EAEAEA">' + html + '</div>';
}

    counter.textContent = textarea.value.length;
  }
}

function toggleAbstractOverride() {
  var checkbox = document.getElementById('abstract-override');
  var textarea = document.getElementById('sf-abstract');
  var limitSpan = document.getElementById('abstract-limit');
  if (!checkbox || !textarea || !limitSpan) return;
  if (checkbox.checked) {
    textarea.maxLength = 1000;
    limitSpan.textContent = '1000';
  } else {
    textarea.maxLength = 650;
    limitSpan.textContent = '650';
    if (textarea.value.length > 650) {
      textarea.value = textarea.value.slice(0, 650);
      updateAbstractCounter();
    }
  }
}
